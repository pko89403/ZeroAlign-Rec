name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src

      - name: Test
        run: uv run pytest --ignore=tests/test_mlx_runtime.py --ignore=tests/test_cli_smoke_mlx.py --ignore=tests/test_graphify_auto_refresh.py

  graphify-full-refresh-candidate:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect graphify-relevant changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            graphify_relevant:
              - "src/**"
              - "tests/**"
              - "raw/**"
              - ".github/workflows/ci.yml"
              - "scripts/graphify_ci_candidate.sh"
              - "scripts/graphify_prepare_corpus.sh"
              - "scripts/graphify_full_refresh.py"
              - "scripts/graphify_semantic_adapter.py"
              - "scripts/graphify_verify_full_refresh.py"

      - name: Set up Python
        if: steps.changes.outputs.graphify_relevant == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare staged graphify corpus
        if: steps.changes.outputs.graphify_relevant == 'true'
        run: bash scripts/graphify_prepare_corpus.sh

      - name: Write candidate summary
        if: steps.changes.outputs.graphify_relevant == 'true'
        run: |
          bash scripts/graphify_ci_candidate.sh
          cat .graphify-work/FULL_REFRESH_CANDIDATE.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Graphify candidate artifact
        if: steps.changes.outputs.graphify_relevant == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: graphify-full-refresh-candidate
          path: .graphify-work/FULL_REFRESH_CANDIDATE.md
