<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ZeroAlign-Rec logo</title>
  <desc id="desc">ZeroAlign-Rec wordmark with a refined semantic recommendation icon, centered alignment axis, and graph-inspired node motif.</desc>
  <defs>
    <linearGradient id="panel" x1="40" y1="36" x2="292" y2="286" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.58" stop-color="#1E1B4B"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="accent" x1="98" y1="72" x2="258" y2="254" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.52" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="shadow" x="14" y="12" width="304" height="304" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="40" y="36" width="252" height="252" rx="68" fill="url(#panel)"/>
    <rect x="48" y="44" width="236" height="236" rx="60" stroke="#94A3B8" stroke-opacity="0.15" stroke-width="2"/>
    <circle cx="166" cy="162" r="80" stroke="#A78BFA" stroke-opacity="0.14" stroke-width="2"/>
    <circle cx="166" cy="162" r="62" stroke="#67E8F9" stroke-opacity="0.12" stroke-width="2"/>
    <path d="M166 86V238" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <path d="M166 122L114 144L208 198L152 230" stroke="#F8FAFC" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M166 112L120 132" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" opacity="0.88"/>
    <path d="M114 144L88 192" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" opacity="0.82"/>
    <path d="M208 198L246 180" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" opacity="0.82"/>
    <path d="M166 230L220 210" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" opacity="0.88"/>
    <circle cx="166" cy="112" r="14" fill="#67E8F9"/>
    <circle cx="120" cy="132" r="12" fill="#A78BFA"/>
    <circle cx="88" cy="192" r="12" fill="#34D399"/>
    <circle cx="246" cy="180" r="12" fill="#34D399"/>
    <circle cx="220" cy="210" r="12" fill="#A78BFA"/>
    <circle cx="166" cy="162" r="34" fill="#0B1120" stroke="url(#accent)" stroke-width="8"/>
    <circle cx="166" cy="162" r="10" fill="#F8FAFC"/>
  </g>

  <g>
    <text x="360" y="142" font-family="Inter, SF Pro Display, Segoe UI, Arial, sans-serif" font-size="88" font-weight="800" letter-spacing="-2.2" fill="#0F172A">
      ZeroAlign<tspan fill="#7C3AED">-Rec</tspan>
    </text>
    <text x="364" y="192" font-family="Inter, SF Pro Display, Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="1.2" fill="#334155">
      TRAINING-FREE SEMANTIC RECOMMENDATION
    </text>
    <rect x="364" y="224" width="148" height="12" rx="6" fill="#67E8F9"/>
    <rect x="528" y="224" width="194" height="12" rx="6" fill="#8B5CF6"/>
    <rect x="738" y="224" width="136" height="12" rx="6" fill="#34D399"/>
  </g>
</svg>
