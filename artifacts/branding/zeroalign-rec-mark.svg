<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ZeroAlign-Rec logo mark</title>
  <desc id="desc">A semantic recommendation logo mark with a centered alignment axis, connected recommendation nodes, and a stylized Z path.</desc>
  <defs>
    <linearGradient id="bg" x1="88" y1="72" x2="424" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.55" stop-color="#1E1B4B"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="120" x2="352" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 256) rotate(90) scale(156)">
      <stop stop-color="#A78BFA" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="40" y="40" width="432" height="432" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020617" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="72" y="72" width="368" height="368" rx="96" fill="url(#bg)"/>
    <rect x="80" y="80" width="352" height="352" rx="88" stroke="#67E8F9" stroke-opacity="0.18" stroke-width="2"/>
    <circle cx="256" cy="256" r="138" fill="url(#glow)"/>

    <path d="M256 130V382" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" opacity="0.9"/>

    <path d="M256 192L186 218L314 294L238 324" stroke="#E2E8F0" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M256 164L176 196" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <path d="M186 218L132 268" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <path d="M256 256L146 256" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.65"/>
    <path d="M314 294L380 268" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <path d="M256 348L336 316" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.85"/>

    <circle cx="256" cy="164" r="18" fill="#67E8F9"/>
    <circle cx="176" cy="196" r="16" fill="#A78BFA"/>
    <circle cx="132" cy="268" r="16" fill="#34D399"/>
    <circle cx="146" cy="256" r="12" fill="#67E8F9" fill-opacity="0.72"/>
    <circle cx="380" cy="268" r="16" fill="#34D399"/>
    <circle cx="336" cy="316" r="16" fill="#A78BFA"/>
    <circle cx="256" cy="348" r="18" fill="#67E8F9"/>

    <circle cx="256" cy="256" r="42" fill="#0B1120" stroke="url(#accent)" stroke-width="10"/>
    <circle cx="256" cy="256" r="12" fill="#F8FAFC"/>
  </g>
</svg>
