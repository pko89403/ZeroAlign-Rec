<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ZeroAlign-Rec logo mark</title>
  <desc id="desc">A refined semantic recommendation logo mark with a centered semantic hub, alignment axis, and graph-like recommendation nodes around a stylized Z trajectory.</desc>
  <defs>
    <linearGradient id="bg" x1="88" y1="72" x2="432" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.58" stop-color="#1E1B4B"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="accent" x1="152" y1="120" x2="360" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.52" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 256) rotate(90) scale(164)">
      <stop stop-color="#C4B5FD" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#C4B5FD" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="40" y="40" width="432" height="432" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="72" y="72" width="368" height="368" rx="100" fill="url(#bg)"/>
    <rect x="80" y="80" width="352" height="352" rx="92" stroke="#94A3B8" stroke-opacity="0.14" stroke-width="2"/>
    <circle cx="256" cy="256" r="150" fill="url(#halo)"/>

    <circle cx="256" cy="256" r="112" stroke="#A78BFA" stroke-opacity="0.14" stroke-width="2"/>
    <circle cx="256" cy="256" r="88" stroke="#67E8F9" stroke-opacity="0.12" stroke-width="2"/>

    <path d="M256 136V376" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" opacity="0.92"/>

    <path d="M256 178L180 208L316 284L236 334" stroke="#F8FAFC" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M256 168L190 196" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.88"/>
    <path d="M180 208L136 268" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.82"/>
    <path d="M316 284L372 258" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.82"/>
    <path d="M256 344L330 314" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.88"/>

    <circle cx="256" cy="168" r="18" fill="#67E8F9"/>
    <circle cx="190" cy="196" r="16" fill="#A78BFA"/>
    <circle cx="136" cy="268" r="16" fill="#34D399"/>
    <circle cx="372" cy="258" r="16" fill="#34D399"/>
    <circle cx="330" cy="314" r="16" fill="#A78BFA"/>
    <circle cx="256" cy="344" r="18" fill="#67E8F9"/>

    <circle cx="256" cy="256" r="46" fill="#0B1120" stroke="url(#accent)" stroke-width="10"/>
    <circle cx="256" cy="256" r="14" fill="#F8FAFC"/>
  </g>
</svg>
